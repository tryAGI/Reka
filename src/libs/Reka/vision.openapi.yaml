openapi: 3.1.0
info:
  title: API Reference
  version: 1.0.0
paths:
  /v1/videos/upload:
    post:
      operationId: upload
      summary: Upload Video
      description: Upload a new video for search and Q&A.
      tags:
        - subpackage_videos
      parameters:
        - name: X-Api-Key
          in: header
          description: API key authentication via X-Api-Key header
          required: true
          schema:
            type: string
        - name: X-Enable-Overwrite-Metering
          in: header
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orchestrator__protocol__VideoUploadResponse'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                video_url:
                  type: string
                  description: >-
                    Video URL for Reka to download from before indexing, for e.g.
                    https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4
                index:
                  type: boolean
                  description: A boolean flag to indicate whether or not to index the provided video
                enable_thumbnails:
                  type: boolean
                  default: false
                  description: A boolean flag to indicate whether or not to index the enable thumbnails when indexing the video
                video_name:
                  type: string
                  description: A name to associate with your video. Required for file uploads, optional for URL uploads
                video_absolute_start_timestamp:
                  type: string
                  description: >-
                    The real-world timestamp when the video recording started, in ISO 8601 format (e.g.,
                    '2024-01-01T00:00:00Z')
                config:
                  type: string
                  description: JSON string containing VideoIndexingParams configuration for advanced indexing options
                person_indexing:
                  type: boolean
                  description: Whether to enable person/object detection and indexing for the video.
                persist_frames:
                  type: boolean
                  description: Whether to persist extracted video frames for later retrieval
                caption_prompt:
                  type: string
                  description: Custom prompt to use when generating captions for video segments
                encode_chunks:
                  type: boolean
                  description: Whether to encode video chunks during indexing
                caption_mode:
                  $ref: '#/components/schemas/CaptionMode'
                  description: Predefined caption mode to use for generating captions
                group_id:
                  type: string
                  description: ID of the video group to associate this video with
                chunking_config:
                  type: string
                  description: JSON string containing ChunkingConfig for custom video chunking behavior
              required:
                - index
  /v1/videos/{video_id}:
    get:
      operationId: get-video
