components:
  schemas:
    CaptionMode:
      type: string
      enum:
        - generic
        - security
        - tagging_ad_video
        - tte_1110
      title: CaptionMode
    orchestrator__protocol__VideoUploadResponse:
      type: object
      properties:
        video_id:
          type: string
          description: Unique identifier for the uploaded video
        video_s3_url:
          type:
            - string
            - 'null'
          description: S3 URL of the uploaded video (null for background processing)
        status:
          type:
            - string
            - 'null'
          default: upload_initiated
          description: Status of the upload
      required:
        - video_id
      title: orchestrator__protocol__VideoUploadResponse
    VideoMetadata:
      type: object
      properties:
        width:
          type:
            - integer
            - 'null'
          description: Width of the video in pixels
        height:
          type:
            - integer
            - 'null'
          description: Height of the video in pixels
        avg_fps:
          type:
            - number
            - 'null'
          format: double
          description: Average frames per second
        video_name:
          type:
            - string
            - 'null'
          description: Name of the video
        title:
          type:
            - string
            - 'null'
          description: Title of the video
        video_start_timestamp_utc_ms:
          type:
            - integer
            - 'null'
          description: Start timestamp in milliseconds
        duration:
          type:
            - number
            - 'null'
          format: double
          description: Duration of the video in seconds
        thumbnail:
          type:
            - string
            - 'null'
          description: URL to the video thumbnail
        thumbnails:
          type:
            - string
            - 'null'
          description: URL, typically VTT, pointing to generated storyboard thumbnails
        description:
          type:
            - string
            - 'null'
          description: Description of the video
        source:
          type:
            - string
            - 'null'
          description: Source path or URL of the video
      title: VideoMetadata
    VideoIndexingStatus:
      type: string
      enum:
        - pending
        - indexing
        - indexed
        - failed
      title: VideoIndexingStatus
    UserIndexingParams:
      type: string
      enum:
        - fast_search
        - qa_and_search
        - qa
        - reels
      description: User-facing indexing parameters enum for API responses
      title: UserIndexingParams
    VideosGetResponseChunk:
      type: object
      properties:
        video_id:
          type: string
          description: Unique identifier for the video
        url:
          type: string
          description: Presigned S3 URL to access the video
        metadata:
          oneOf:
            - $ref: '#/components/schemas/VideoMetadata'
            - type: 'null'
          description: Metadata for a video
        indexing_status:
          oneOf:
            - $ref: '#/components/schemas/VideoIndexingStatus'
            - type: 'null'
          description: Status of video indexing
        indexing_type:
          oneOf:
            - $ref: '#/components/schemas/UserIndexingParams'
            - type: 'null'
          description: Type of indexing applied to the video
        group_id:
          type:
            - string
            - 'null'
          description: Group ID if video belongs to a group
      required:
        - video_id
        - url
      title: VideosGetResponseChunk
    VideosGetResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VideosGetResponseChunk'
          description: List of video results
      required:
        - results
      title: VideosGetResponse
    VideoDeleteResponse:
      type: object
      properties:
        status:
          type: string
          description: Status of the deletion
        message:
          type:
            - string
            - 'null'
          description: Status message
      required:
        - status
      title: VideoDeleteResponse
    orchestrator__protocol__VideoGroupCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Name for the new video group
        metadata:
          type:
            - object
            - 'null'
          additionalProperties:
            description: Any type
          description: Optional metadata to attach to the newly created group
      required:
        - name
      title: orchestrator__protocol__VideoGroupCreateRequest
    orchestrator__protocol__VideoGroupResponse:
      type: object
      properties:
        group_id:
          type: string
          description: Unique identifier for the video group
        name:
          type: string
          description: Name of the video group
        metadata:
          type: object
          additionalProperties:
            description: Any type
          description: Arbitrary metadata attached to the group
        created_at:
          type:
            - string
            - 'null'
          description: ISO 8601 timestamp when group was created
        updated_at:
          type:
            - string
            - 'null'
          description: ISO 8601 timestamp when group was last updated
      required:
        - group_id
        - name
      title: orchestrator__protocol__VideoGroupResponse
    orchestrator__protocol__VideoGroupListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/orchestrator__protocol__VideoGroupResponse'
          description: List of video groups
      required:
        - results
      title: orchestrator__protocol__VideoGroupListResponse
    orchestrator__protocol__VideoGroupUpdateRequest:
      type: object
      properties:
        name:
          type:
            - string
            - 'null'
          description: New name for the video group
        metadata:
          type:
            - object
            - 'null'
          additionalProperties:
            description: Any type
          description: Updated metadata for the video group. Pass null to leave unchanged.
      title: orchestrator__protocol__VideoGroupUpdateRequest
    orchestrator__protocol__VideoGroupDeleteResponse:
      type: object
      properties:
        status:
          type: string
          description: Status of the deletion
        message:
          type:
            - string
            - 'null'
          description: Status message
      required:
        - status
      title: orchestrator__protocol__VideoGroupDeleteResponse
    SearchRequest:
      type: object
      properties:
        query:
          type: string
        threshold:
          type:
            - number
            - 'null'
          format: double
        max_results:
          type: integer
          default: 10
        video_ids:
          type:
            - array
            - 'null'
          items:
            type: string
        group_ids:
          type:
            - array
            - 'null'
          items:
            type: string
        search_demo:
          type: boolean
          default: false
        use_llm_rerank:
          type: boolean
          default: false
        use_embeds_rerank:
          type: boolean
          default: true
        add_ocr_to_caption:
          type: boolean
          default: false
        datetime_from:
          type:
            - string
            - 'null'
          description: Filter from datetime (ISO 8601 format, e.g., 2024-01-15T10:00:00Z)
        datetime_to:
          type:
            - string
            - 'null'
          description: Filter to datetime (ISO 8601 format, e.g., 2024-01-15T18:00:00Z)
        timestamp_from:
          type:
            - number
            - 'null'
          format: double
          description: Filter from video timestamp in seconds (relative to video start)
        timestamp_to:
          type:
            - number
            - 'null'
          format: double
          description: Filter to video timestamp in seconds (relative to video start)
        generate_report:
          type: boolean
          default: false
          description: Whether to generate a report and explanations for the search results
      required:
        - query
      description: Base class for search requests
      title: SearchRequest
    VideoChunkSearchResultScore:
      oneOf:
        - type: number
          format: double
        - type: string
      description: Relevance score
      title: VideoChunkSearchResultScore
    VideoChunkSearchResult:
      type: object
      properties:
        video_chunk_id:
          type: string
          description: Unique identifier for the video chunk
        video_id:
          type: string
          description: Unique identifier for the video
        user_id:
          type: string
          description: User ID who owns the video
        score:
          $ref: '#/components/schemas/VideoChunkSearchResultScore'
          description: Relevance score
        start_timestamp:
          type:
            - number
            - 'null'
          format: double
          description: Start timestamp in seconds
        end_timestamp:
          type:
            - number
            - 'null'
          format: double
          description: End timestamp in seconds
        plain_text_caption:
          type:
            - string
            - 'null'
          description: Text caption for the video chunk
        plain_text_transcript:
          type:
            - string
            - 'null'
          description: Transcription of speech in the video chunk
        s3_presigned_url:
          type:
            - string
            - 'null'
          description: Presigned S3 URL to access the parent video
        video_title:
          type:
            - string
            - 'null'
          description: Title stored in the video's metadata
        video_thumbnails:
          type:
            - string
            - 'null'
          description: URL (typically VTT) pointing to generated storyboard thumbnails
        explanation:
          type:
            - string
            - 'null'
          description: Explanation of the video chunk content and its relevance to the search query
      required:
        - video_chunk_id
        - video_id
        - user_id
        - score
      description: Result from hybrid search combining object and embedding search
      title: VideoChunkSearchResult
    VideoSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VideoChunkSearchResult'
          description: List of search results
        report:
          type:
            - string
            - 'null'
          description: Report summarizing the search results
      required:
        - results
      title: VideoSearchResponse
    SimpleChatMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content
      title: SimpleChatMessage
    VideoQARequest:
      type: object
      properties:
        user_id:
          type:
            - string
            - 'null'
          description: Override user ID. Takes precedence over API key header when provided.
        video_id:
          type: string
          description: The ID of the video to query.
        messages:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/SimpleChatMessage'
          description: The conversation history. The last message must be from the user and contain the query.
        stream:
          type:
            - boolean
            - 'null'
          default: false
          description: If true, stream the response using server-sent events (SSE).
        apply_temporal_prefiltering:
          type:
            - boolean
            - 'null'
          default: true
          description: If true, apply temporal pre-filtering to narrow down the video timestamp search space.
        include_demo_videos:
          type:
            - boolean
            - 'null'
          default: false
          description: If true, include demo videos in the QA flow.
        use_map_reduce_summarization:
          type:
            - boolean
            - 'null'
          default: false
          description: If true, use map-reduce summarization instead of one-shot summarization.
      required:
        - video_id
      title: VideoQARequest
    VideoQaResponseChatResponse:
      oneOf:
        - type: string
        - type: object
          additionalProperties:
            description: Any type
      title: VideoQaResponseChatResponse
    VideoQaResponseStatus:
      type: string
      enum:
        - pending
        - indexing
        - streaming
        - success
        - error
      default: pending
      title: VideoQaResponseStatus
    VideoQAResponse:
      type: object
      properties:
        chat_response:
          oneOf:
            - $ref: '#/components/schemas/VideoQaResponseChatResponse'
            - type: 'null'
        status:
          $ref: '#/components/schemas/VideoQaResponseStatus'
      title: VideoQAResponse
    VideoTaggingAdvertisingResult:
      type: object
      properties:
        Description:
          type: string
        Violence:
          type: boolean
        Profanity:
          type: boolean
        AdultContent:
          type: boolean
        Drugs:
          type: boolean
        Alcohol:
          type: boolean
        Gambling:
          type: boolean
        Political:
          type: boolean
        ExpectedCTR:
          type: number
          format: double
        ViralityScore:
          type: number
          format: double
        Keyword:
          type: array
          items:
            type: string
        MoodTone:
          type: array
          items:
            type: string
      required:
        - Description
        - Violence
        - Profanity
        - AdultContent
        - Drugs
        - Alcohol
        - Gambling
        - Political
        - ExpectedCTR
        - ViralityScore
        - Keyword
        - MoodTone
      title: VideoTaggingAdvertisingResult
    VideoTaggingRequest:
      type: object
      properties:
        video_id:
          type: string
          description: ID of the video to tag
      required:
        - video_id
      title: VideoTaggingRequest
    Metadata Tagging_indexed_tag_v1_qa_indexedtag_post_Response_200:
      oneOf:
        - $ref: '#/components/schemas/VideoTaggingAdvertisingResult'
        - type: string
      title: Metadata Tagging_indexed_tag_v1_qa_indexedtag_post_Response_200
    ReelQuality:
      type: string
      enum:
        - premium
        - lite
        - fallback
        - full_video
      title: ReelQuality
    VideoGenerationTemplate:
      type: string
      enum:
        - compilation
        - moments
        - voiceover
        - trailer
        - caption_only
      title: VideoGenerationTemplate
    SubtitleTranslationLocale:
      type: string
      enum:
        - ar_SA
        - cs_CZ
        - da_DK
        - de_DE
        - el_GR
        - en_GB
        - en_US
        - es_ES
        - es_MX
        - fi_FI
        - fil_PH
        - fr_CA
        - fr_FR
        - he_IL
        - hi_IN
        - hu_HU
        - id_ID
        - it_IT
        - ja_JP
        - ko_KR
        - ms_MY
        - nl_NL
        - no_NO
        - pl_PL
        - pt_BR
        - pt_PT
        - ro_RO
        - ru_RU
        - sv_SE
        - th_TH
        - tr_TR
        - uk_UA
        - vi_VN
        - zh_CN
        - zh_TW
      description: Allowed locale codes (underscore BCP-47 style) for subtitle translation.
      title: SubtitleTranslationLocale
    ClipGenerationConfig:
      type: object
      properties:
        template:
          $ref: '#/components/schemas/VideoGenerationTemplate'
          description: Template type for generation
        num_generations:
          type:
            - integer
            - 'null'
          description: >-
            Number of clips to generate. When provided, must be 1-3. Omit to auto-derive the count from the effective
            video duration: 3 for videos up to 45 minutes, +1 per additional 15 minutes, capped at 12. The resolved
            count is returned in the response once auto-resolution completes.
        min_duration_seconds:
          type: integer
          default: 0
          description: Minimum duration in seconds
        max_duration_seconds:
          type: integer
          default: 90
          description: Maximum duration in seconds
        source_start_time:
          type:
            - integer
            - 'null'
          description: Start time in seconds for source video download.
        source_end_time:
          type:
            - integer
            - 'null'
          description: End time in seconds for source video download.
        translated_subtitles_target_language:
          oneOf:
            - $ref: '#/components/schemas/SubtitleTranslationLocale'
            - type: 'null'
          description: Optional locale to auto-generate translated subtitles after generation completes.
        translated_subtitles_group_length:
          type:
            - integer
            - 'null'
          description: Max character length of a translated subtitle group before splitting on word boundaries.
      description: Generation settings for the Clip API
      title: ClipGenerationConfig
    AspectRatio:
      type: string
      enum:
        - '9:16'
        - 9:16-split
        - '16:9'
        - '4:5'
        - '1:1'
      title: AspectRatio
    VideoResolution:
      type: string
      enum:
        - '240'
        - '360'
        - '480'
        - '720'
        - '1080'
      description: Video resolution options in pixels (height).
      title: VideoResolution
    CaptionFontConfigTextTransform:
      type: string
      enum:
        - initial
        - uppercase
        - lowercase
      title: CaptionFontConfigTextTransform
    CaptionFontConfigPosition:
      type: string
      enum:
        - top
        - bottom
        - middle
      title: CaptionFontConfigPosition
    CaptionFontConfigFontFamily:
      type: string
      enum:
        - BebasNeue
        - Bangers
        - RobotoCondensed
        - Lato
        - CaptionFont
      title: CaptionFontConfigFontFamily
    CaptionFontConfig:
      type: object
      properties:
        desired_font_size:
          type:
            - number
            - 'null'
          format: double
        text_transform:
          oneOf:
            - $ref: '#/components/schemas/CaptionFontConfigTextTransform'
            - type: 'null'
        text_color:
          type:
            - string
            - 'null'
        highlight_color:
          type:
            - string
            - 'null'
        stroke_color:
          type:
            - string
            - 'null'
        position:
          oneOf:
            - $ref: '#/components/schemas/CaptionFontConfigPosition'
            - type: 'null'
        font_family:
          oneOf:
            - $ref: '#/components/schemas/CaptionFontConfigFontFamily'
            - type: 'null'
      title: CaptionFontConfig
    ClipLayout:
      type: string
      enum:
        - ai
        - fit
      description: |-
        Reframing layout choice for non-16:9 aspect ratios.

        AI: bbox-driven cover crop (zoom into faces/text). FIT: full source frame
        scaled into the target with letterbox/pillarbox bars.
      title: ClipLayout
    ClipRenderingConfig:
      type: object
      properties:
        show_watermark:
          type: boolean
          default: false
          description: Whether to display reka watermark
        subtitles:
          type: boolean
          default: true
          description: Whether to enable subtitles
        aspect_ratio:
          $ref: '#/components/schemas/AspectRatio'
          description: Aspect ratio for the video
        resolution:
          $ref: '#/components/schemas/VideoResolution'
          description: Target resolution for the video
        caption_style:
          oneOf:
            - $ref: '#/components/schemas/CaptionFontConfig'
            - type: 'null'
          description: Caption styling overrides
        layout:
          $ref: '#/components/schemas/ClipLayout'
          description: >-
            How to fit the source video into the target aspect_ratio. 'ai' (default) reframes the source to fill the
            target, keeping the most relevant content in view. 'fit' preserves the entire source frame inside the
            target, adding bars on the unfilled sides.
      description: Rendering settings for the Clip API
      title: ClipRenderingConfig
    ClipRequest:
      type: object
      properties:
        video_urls:
          type: array
          items:
            type: string
            format: uri
          description: List of video URLs to process
        prompt:
          type:
            - string
            - 'null'
          default: Create an engaging short video highlighting the best moments
          description: Prompt for video generation
        generation_config:
          $ref: '#/components/schemas/ClipGenerationConfig'
          description: Grouped generation configuration
        rendering_config:
          $ref: '#/components/schemas/ClipRenderingConfig'
          description: Grouped rendering configuration
        stream:
          type: boolean
          default: false
          description: Whether to stream the generation process
      required:
        - video_urls
      description: Request model for Clip API
      title: ClipRequest
    ClipGenerationConfigResult:
      type: object
      properties:
        template:
          $ref: '#/components/schemas/VideoGenerationTemplate'
          description: Template type for generation
        num_generations:
          type:
            - integer
            - 'null'
          description: >-
            Resolved number of clips. 1-12 once auto-resolution completes; 0 while an auto request is still pending
            resolution.
        min_duration_seconds:
          type: integer
          default: 0
          description: Minimum duration in seconds
        max_duration_seconds:
          type: integer
          default: 90
          description: Maximum duration in seconds
        source_start_time:
          type:
            - integer
            - 'null'
          description: Start time in seconds for source video download.
        source_end_time:
          type:
            - integer
            - 'null'
          description: End time in seconds for source video download.
        translated_subtitles_target_language:
          oneOf:
            - $ref: '#/components/schemas/SubtitleTranslationLocale'
            - type: 'null'
          description: Optional locale to auto-generate translated subtitles after generation completes.
        translated_subtitles_group_length:
          type:
            - integer
            - 'null'
          description: Max character length of a translated subtitle group before splitting on word boundaries.
      description: |-
        Response-side view of the generation config.

        Request input caps ``num_generations`` at 1-3, but the auto pipeline
        resolves it from video duration up to 12 (and transiently 0 before
        resolution completes). Widening the bound here keeps the response
        OpenAPI schema honest so strict clients don't reject a valid 0-12 value.
      title: ClipGenerationConfigResult
